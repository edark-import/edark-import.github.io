<script>
fetch('footer.html')
  .then(res => res.text())
  .then(html => {
    document.getElementById('footer').innerHTML = html;
  });

fetch('navbar.html')
  .then(res => res.text())
  .then(html => {
        const navbarContainer = document.getElementById('navbar');
        navbarContainer.innerHTML = html;
    
        // Ejecutar scripts insertados dinámicamente
        const scripts = navbarContainer.querySelectorAll('script');
        scripts.forEach(oldScript => {
            const newScript = document.createElement('script');
            if (oldScript.src) {
                newScript.src = oldScript.src;
            } else {
                newScript.textContent = oldScript.textContent;
            }
            document.body.appendChild(newScript);
            oldScript.remove();
        });
    });
</script>

                let menu = submenu.querySelector('.dropdown-menu');
                if (menu) menu.classList.add('show');

                if (menu) menu.classList.remove('show');
            });

    <script>

            { nombre: "Intel Core i7 13th Gen", precio: 1450 },
            { nombre: "Intel Core i7 14th Gen", precio: 1650 },
            { nombre: "Intel Core i9 14th Gen K", precio: 2400 },
            { nombre: "AMD Ryzen 5 5600G", precio: 550 },
            { nombre: "AMD Ryzen 5 7600X", precio: 980 },
            { nombre: "AMD Ryzen 7 5700X", precio: 820 },
            { nombre: "AMD Ryzen 7 7800X3D", precio: 1750 },

            { nombre: "64GB (2x32GB) DDR5 6000MHz", precio: 980 }
        ],
        almacenamientos: [
            { nombre: "SSD SATA 512GB", precio: 160 },
            { nombre: "SSD SATA 1TB", precio: 280 },
            { nombre: "M.2 NVMe 512GB PCIe 4.0", precio: 220 },
            { nombre: "M.2 NVMe 1TB PCIe 4.0", precio: 360 },
            { nombre: "M.2 NVMe 2TB PCIe 4.0", precio: 680 },
            { nombre: "M.2 NVMe 4TB PCIe 4.0", precio: 1350 },
            { nombre: "HDD 2TB 7200RPM", precio: 290 }
        ],
        graficas: [
            { nombre: "Integrada (Radeon / UHD Graphics)", precio: 0 },
            { nombre: "NVIDIA GTX 1650 4GB", precio: 680 },
            { nombre: "NVIDIA RTX 3060 12GB", precio: 1250 },
            { nombre: "NVIDIA RTX 4060 8GB", precio: 1480 },
            { nombre: "NVIDIA RTX 4060 Ti 16GB", precio: 2100 },
            { nombre: "NVIDIA RTX 4070 Super 12GB", precio: 2890 },
            { nombre: "NVIDIA RTX 4080 Super 16GB", precio: 4800 },
            { nombre: "AMD Radeon RX 6600 8GB", precio: 950 },
            { nombre: "AMD Radeon RX 7600 8GB", precio: 1320 },
            { nombre: "AMD Radeon RX 7700 XT 12GB", precio: 2150 },
            { nombre: "AMD Radeon RX 7800 XT 16GB", precio: 2600 }
        ]
    };

    let preciosPCMapa = {};
    let configActiva = null;

    document.addEventListener('DOMContentLoaded', async function () {
        await cargarConfiguracionPreciosPC();

        // Vincular eventos de cambio para cotización en tiempo real
        ['procesador', 'ram', 'almacenamiento', 'grafica', 'nombre', 'pantalla', 'teclado', 'mouse', 'mousepad', 'wifi', 'bluetooth'].forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                el.addEventListener('change', actualizarResumenPC);
                if (el.tagName === 'INPUT' && el.type === 'text') el.addEventListener('input', actualizarResumenPC);
            }
        });
    });

    async function cargarConfiguracionPreciosPC() {
        try {
            // Intentar cargar de Firestore nube primero
            if (typeof db !== 'undefined' && db.collection) {
                const snap = await db.collection('configuraciones').doc('precios_pc').get();
                if (snap.exists) {
                    configActiva = snap.data();
                    localStorage.setItem('eDark_precios_pc', JSON.stringify(configActiva));
                }
            }
        } catch (e) {
            console.warn('Cargando desde almacenamiento local:', e.message);
        }

        if (!configActiva) {
            const loc = localStorage.getItem('eDark_precios_pc');
            configActiva = loc ? JSON.parse(loc) : JSON.parse(JSON.stringify(CONFIG_PC_DEFAULT));
        }

        // Construir mapa de precios por nombre y rellenar los selects
        preciosPCMapa = {};
        
        // 1. Procesador
        poblarSelectComponente('procesador', configActiva.procesadores || CONFIG_PC_DEFAULT.procesadores);
        // 2. RAM
        poblarSelectComponente('ram', configActiva.rams || CONFIG_PC_DEFAULT.rams);
        // 3. Almacenamiento
        poblarSelectComponente('almacenamiento', configActiva.almacenamientos || CONFIG_PC_DEFAULT.almacenamientos);
        // 4. Gráfica
        poblarSelectComponente('grafica', configActiva.graficas || CONFIG_PC_DEFAULT.graficas);
    }

    function poblarSelectComponente(selectId, lista) {
        const select = document.getElementById(selectId);
        if (!select) return;
        select.innerHTML = '<option value="">Selecciona una opción...</option>';
        lista.forEach(item => {
            preciosPCMapa[item.nombre] = Number(item.precio) || 0;
            const option = document.createElement('option');
            option.value = item.nombre;
            option.textContent = `${item.nombre} ${item.precio > 0 ? '(+ S/ ' + Number(item.precio).toFixed(2) + ')' : '(S/ 0.00)'}`;
            select.appendChild(option);
        });
    }

    function actualizarResumenPC() {
        const nombre = document.getElementById('nombre').value.trim() || 'Cliente eDark';
        const proc = document.getElementById('procesador').value;
        const ram = document.getElementById('ram').value;
        const alm = document.getElementById('almacenamiento').value;
        const graf = document.getElementById('grafica').value;
        const complementos = [];
        ['pantalla', 'teclado', 'mouse', 'mousepad', 'wifi', 'bluetooth'].forEach(id => {
            if (document.getElementById(id).checked) complementos.push(document.getElementById(id).value);
        });

        if (!proc && !ram && !alm && !graf) {
            document.getElementById('cotizacionResultado').innerHTML = '';
            document.getElementById('enviarWhatsapp').style.display = 'none';
            return;
        }

        let costoProc = preciosPCMapa[proc] || 0;
        let costoRam = preciosPCMapa[ram] || 0;
        let costoAlm = preciosPCMapa[alm] || 0;
        let costoGraf = preciosPCMapa[graf] || 0;
        let total = costoProc + costoRam + costoAlm + costoGraf;

        let resumen = `
            <div class="card border-0 shadow-lg rounded-4 overflow-hidden mt-4 bg-white">
                <div class="card-header bg-primary text-white py-3 px-4 d-flex justify-content-between align-items-center">
                    <h5 class="mb-0 fw-bold"><i class="bi bi-pc-display-horizontal me-2"></i>Cotización en Tiempo Real</h5>
                    <span class="badge bg-light text-primary fw-bold px-3 py-1 rounded-pill">PC Gamer / Trabajo</span>
                </div>
                <div class="card-body p-4">
                    <div class="row g-3 mb-3 border-bottom pb-3">
                        <div class="col-sm-6">
                            <span class="text-muted small d-block">Cliente</span>
                            <strong class="text-dark fs-6">${nombre}</strong>
                        </div>
                        <div class="col-sm-6 text-sm-end">
                            <span class="text-muted small d-block">Total Estimado</span>
                            <strong class="text-success fs-3 font-orbitron">S/ ${total.toFixed(2)}</strong>
                        </div>
                    </div>
                    <ul class="list-group list-group-flush mb-3">
                        <li class="list-group-item d-flex justify-content-between align-items-center px-0 py-2">
                            <span><i class="bi bi-cpu text-primary me-2"></i><strong>Procesador:</strong> ${proc || 'No seleccionado'}</span>
                            <span class="fw-semibold text-dark">${proc ? 'S/ ' + costoProc.toFixed(2) : '-'}</span>
                        </li>
                        <li class="list-group-item d-flex justify-content-between align-items-center px-0 py-2">
                            <span><i class="bi bi-memory text-primary me-2"></i><strong>Memoria RAM:</strong> ${ram || 'No seleccionado'}</span>
                            <span class="fw-semibold text-dark">${ram ? 'S/ ' + costoRam.toFixed(2) : '-'}</span>
                        </li>
                        <li class="list-group-item d-flex justify-content-between align-items-center px-0 py-2">
                            <span><i class="bi bi-device-ssd text-primary me-2"></i><strong>Almacenamiento:</strong> ${alm || 'No seleccionado'}</span>
                            <span class="fw-semibold text-dark">${alm ? 'S/ ' + costoAlm.toFixed(2) : '-'}</span>
                        </li>
                        <li class="list-group-item d-flex justify-content-between align-items-center px-0 py-2">
                            <span><i class="bi bi-gpu-card text-primary me-2"></i><strong>Tarjeta Gráfica:</strong> ${graf || 'No seleccionado'}</span>
                            <span class="fw-semibold text-dark">${graf ? 'S/ ' + costoGraf.toFixed(2) : '-'}</span>
                        </li>
                        <li class="list-group-item d-flex justify-content-between align-items-center px-0 py-2">
                            <span><i class="bi bi-plus-circle text-info me-2"></i><strong>Complementos:</strong> ${complementos.length ? complementos.join(', ') : 'Ninguno'}</span>
                            <span class="badge bg-secondary rounded-pill">${complementos.length} ítems</span>
                        </li>
                    </ul>
                    <p class="text-muted small mb-0"><i class="bi bi-info-circle me-1"></i> *Precio referencial en Soles (S/). La cotización final está sujeta a stock disponible al momento de confirmar el pedido con un asesor.</p>
                </div>
            </div>
        `;
        document.getElementById('cotizacionResultado').innerHTML = resumen;
        document.getElementById('enviarWhatsapp').style.display = 'inline-block';
    }

    document.getElementById('formPC').addEventListener('submit', function(e) {
        e.preventDefault();
        actualizarResumenPC();
        const element = document.getElementById('cotizacionResultado');
        if (element) element.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });

    // Enviar por WhatsApp
    document.getElementById('enviarWhatsapp').addEventListener('click', function() {
        const nombre = document.getElementById('nombre').value.trim() || 'Cliente';
        const proc = document.getElementById('procesador').value || 'Sin definir';
        const ram = document.getElementById('ram').value || 'Sin definir';
        const alm = document.getElementById('almacenamiento').value || 'Sin definir';
        const graf = document.getElementById('grafica').value || 'Sin definir';
        const complementos = [];
        ['pantalla', 'teclado', 'mouse', 'mousepad', 'wifi', 'bluetooth'].forEach(id => {
            if (document.getElementById(id).checked) complementos.push(document.getElementById(id).value);
        });

        let costoProc = preciosPCMapa[proc] || 0;
        let costoRam = preciosPCMapa[ram] || 0;
        let costoAlm = preciosPCMapa[alm] || 0;
        let costoGraf = preciosPCMapa[graf] || 0;
        let total = costoProc + costoRam + costoAlm + costoGraf;

        let mensaje = `*Hola eDark! Soy ${nombre} y solicito una cotización formal para mi PC Personalizada:*%0A%0A` +

            `*Complementos:* ${complementos.length ? complementos.join(', ') : 'Ninguno'}%0A%0A` +
            `*TOTAL ESTIMADO:* S/ ${total.toFixed(2)}%0A` +
            `_Por favor confirmar disponibilidad y tiempo de entrega._`;

        window.open(`https://wa.me/51916907657?text=${mensaje}`, '_blank');
